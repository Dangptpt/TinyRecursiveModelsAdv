# Sudoku WGAN Adversarial Training Config
# Train TRM với WGAN discriminator trên Sudoku mask 30%

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

# ─── Data ─────────────────────────────────────────────
data_paths: ['data/sudoku-mask30']
data_paths_test: []


# ─── Training ─────────────────────────────────────────
global_batch_size: 128
epochs: 50000
eval_interval: 5000
checkpoint_every_eval: true

# ─── Learning Rate (G) ────────────────────────────────
lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 1000

# ─── Optimizer G ──────────────────────────────────────
beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0
puzzle_emb_lr: 1e-2

# ─── Arch Overrides (TRM Sudoku settings) ────────────
arch:
  # Override loss head → WGAN version
  loss:
    name: losses@ACTWGANLossHead
    loss_type: stablemax_cross_entropy
  mlp_t: true
  pos_encodings: none
  L_layers: 2
  H_cycles: 3
  L_cycles: 6

# ─── WGAN Discriminator ───────────────────────────────
wgan:
  d_hidden_size: 128      # Width
  d_iters: 30             # Iters (đã nâng lên 30)
  d_lr: 5.0e-5            
  d_iters_per_step: 1     
  weight_clip: 0.01       
  adv_weight: 0.1         
  noise_std: 1.0          

# ─── Misc ─────────────────────────────────────────────
seed: 0
min_eval_interval: 0

ema: true
ema_rate: 0.999
freeze_weights: false
